<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker - Business</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h2>Finance</h2>
      <ul>
        <li class="active"> Dashboard </li>
        <li> Transaction</li>
        <li> Reports </li>
      </ul>

         <button id="addbtn"> + Add Transaction </button>
    </div>

    <div class="main">
      <div class="topbar">
        <h3> Financial Intelligence </h3>
        <input type="text" placeholder="Search...">
      </div>

      <div class="content">
        <div class="hero">
          <h1>$124,592</h1>
          <p>+12.5% this month</p>
          
          <button class="income"> Add Income </button>
          <button class="expense"> Add Expense </button>
        </div>
       
        <div class="card">
          <h4>Cash Flow</h4>

        <div class="chart">
            <div class="bar" style="height: 60%;"></div>
            <div class="bar" style="height: 80%;"></div>
            <div class="bar" style="height: 40%;"></div>
            <div class="bar" style="height: 50%;"></div>
           </div>
        </div>

        <div class="card">
          <h4>Transaction</h4>

          <ul id="txList">
            <li> Apple Store - $1299</li>
            <li> Salary + $8890</li>
            <li> Restaurant -$284</li>
          </ul>
        </div>
        
    </div>

    <script src="script.js"></script>
  </body>
</html>
